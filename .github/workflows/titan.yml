name: TITAN 5 Minute Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: titan-automation
  cancel-in-progress: true

jobs:
  titan-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests beautifulsoup4 yfinance ta tabulate python-dotenv

      - name: Verify files
        run: |
          echo "Checking TITAN files..."
          ls -la
          test -f setup_engine.py

      - name: Run TITAN
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: |
          python setup_engine.py

      - name: Save TITAN memory
        run: |
          git config user.name "titan-bot"
          git config user.email "titan@bot.com"

          git add data/ reports/ || true

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update titan memory"
            git pull --rebase || true
            git push || true
          fi