name: TITAN 5 Minute Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types: [titan-cron]

concurrency:
  group: titan-automation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  titan-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy requests beautifulsoup4 yfinance ta tabulate python-dotenv supabase
          fi

      - name: Verify TITAN files
        run: |
          echo "Checking TITAN files..."
          ls -la
          test -f setup_engine.py || test -f titan_master_brain/master_controller.py

      - name: Run TITAN Master Brain
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "from titan_master_brain.master_controller import run_master_brain; run_master_brain()"

      - name: Save TITAN memory
        if: always()
        run: |
          git config user.name "titan-bot"
          git config user.email "titan@bot.com"

          git pull --rebase origin main || true

          git add data/ reports/ state/ || true

          if git diff --cached --quiet; then
            echo "No TITAN memory changes"
          else
            git commit -m "update titan memory"
            git push origin HEAD:main || true
          fi