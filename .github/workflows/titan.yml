name: TITAN 5 Minute Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types: [titan-cron]

concurrency:
  group: titan-automation
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  titan-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy requests beautifulsoup4 yfinance ta tabulate python-dotenv supabase
          fi

      - name: Verify TITAN files
        run: |
          echo "Checking TITAN files..."
          test -f titan_master_brain/master_controller.py

      - name: Safe Python preflight
        run: |
          python -m py_compile dashboard.py
          python -m py_compile titan_master_brain/master_controller.py
          python -m py_compile titan_master_brain/final_decision_engine.py

      - name: Run TITAN Master Brain
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TITAN_RUNTIME_OWNER: "GITHUB_ACTIONS"
          TITAN_QUIET_MODE: "1"
        run: |
          python -c "from titan_master_brain.master_controller import run_master_brain; run_master_brain()"

      - name: Skip Git memory push
        if: always()
        run: |
          echo "Skipping Git memory push during 5-minute live scan."
          echo "TITAN scan, Master Brain, alerts, journaling, and outcome tracking still run."
